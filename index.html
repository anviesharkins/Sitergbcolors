<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Galeria bonita e simples de cores com nomes e valores RGB para copiar." />
  <title>RGB Colors</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <div class="logo">RGB</div>
      <div>
        <p class="mini-title">Color Palette</p>
        <h1>Cores e tons</h1>
        <p class="subtitle">Escolha uma cor, veja o nome e copie o valor RGB com um toque.</p>
      </div>
    </header>

    <section class="quick-copy" aria-label="Cores principais">
      <button type="button" data-copy="rgb(255, 0, 0)" style="--color: rgb(255, 0, 0)">Red</button>
      <button type="button" data-copy="rgb(0, 128, 0)" style="--color: rgb(0, 128, 0)">Green</button>
      <button type="button" data-copy="rgb(0, 0, 255)" style="--color: rgb(0, 0, 255)">Blue</button>
      <button type="button" data-copy="rgb(255, 255, 0)" style="--color: rgb(255, 255, 0)">Yellow</button>
      <button type="button" data-copy="rgb(255, 0, 255)" style="--color: rgb(255, 0, 255)">Pink</button>
      <button type="button" data-copy="rgb(0, 255, 255)" style="--color: rgb(0, 255, 255)">Cyan</button>
    </section>

    <section id="palette" class="palette" aria-live="polite"></section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">Copiado!</div>

  <script src="colors.js"></script>
  <script src="script.js"></script>
</body>
</html>
