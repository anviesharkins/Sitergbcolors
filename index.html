<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Tabela simples de cores com nomes, RGB e HEX para copiar." />
  <title>RGB Colors</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <p class="tag">RGB Colors</p>
        <h1>Cores e tonalidades</h1>
        <p class="subtitle">Veja uma variedade de cores com nome, RGB e HEX. Clique em qualquer valor para copiar.</p>
      </div>
    </header>

    <section class="panel" aria-label="Filtros de cores">
      <label class="search">
        <span>Pesquisar</span>
        <input id="searchInput" type="search" placeholder="Ex: azul, red, #ff0000, rgb(255, 0, 0)" autocomplete="off" />
      </label>

      <div id="categoryFilters" class="filters" aria-label="Categorias"></div>
    </section>

    <section class="results-head">
      <h2 id="resultTitle">Todas as cores</h2>
      <p id="resultCount"></p>
    </section>

    <section id="colorGrid" class="color-grid" aria-live="polite"></section>
    <p id="emptyMessage" class="empty" hidden>Nenhuma cor encontrada.</p>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">Copiado!</div>

  <script src="colors.js"></script>
  <script src="script.js"></script>
</body>
</html>
